<div class="new-scrawl-card" [class.focused]="isFocused()">
  <div class="card-glow"></div>

  <div class="card-header">
    <div class="user-row">
      <div class="avatar-ring">
        <div class="avatar">You</div>
      </div>
      <div class="user-meta">
        <span class="label">New Scrawl</span>
        <span class="sublabel" *ngIf="!isAnonymous()">Posting as yourself</span>
        <span class="sublabel anon" *ngIf="isAnonymous()">✦ Posting anonymously</span>
      </div>
    </div>
    <div class="mood-display" *ngIf="mood() !== 'none'" [attr.data-mood]="mood()">
      {{ getMoodEmoji(mood()) }} {{ mood() | titlecase }}
    </div>
  </div>

  <div class="textarea-wrapper">
    <textarea
      [(ngModel)]="content"
      [value]="content()"
      (ngModelChange)="content.set($event)"
      (focus)="isFocused.set(true)"
      placeholder="What's on your mind, KBTU? Share your mood, thoughts, or a moment..."
      [maxlength]="MAX_CHARS"
      rows="3"
      class="scrawl-input"
    ></textarea>
    @if (charCount > 0) {
      <div class="char-counter" [class.warning]="charCount > MAX_CHARS * 0.85">
        {{ charCount }}/{{ MAX_CHARS }}
      </div>
    }
  </div>

  <!-- Image Preview Area -->
  <div class="image-preview" *ngIf="imageUrl()">
    <img [src]="imageUrl()" alt="Upload preview">
    <button class="remove-img-btn" (click)="removeImage()" title="Remove image">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
  </div>

  <!-- Tags Area -->
  <div class="tags-input-area" *ngIf="isFocused() || tags().length > 0">
    <div class="tags-list">
      @for (tag of tags(); track tag) {
        <span class="tag-badge">
          #{{ tag }}
          <button (click)="removeTag(tag)">×</button>
        </span>
      }
      <input 
        *ngIf="tags().length < 5"
        type="text" 
        class="tag-field" 
        placeholder="Add tag..." 
        [ngModel]="tagInput()" 
        (ngModelChange)="tagInput.set($event)"
        (keydown.enter)="addTag($event)" 
        (keydown.space)="addTag($event)"
      >
    </div>
  </div>

  <div class="card-footer">
    <div class="options-row">
      <!-- Image Upload Trigger -->
      <label class="icon-btn image-upload-btn" title="Attach Image" [class.disabled]="!!imageUrl()">
        <input type="file" accept="image/*" (change)="onFileSelected($event)" [disabled]="!!imageUrl()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
          <circle cx="8.5" cy="8.5" r="1.5"></circle>
          <polyline points="21 15 16 10 5 21"></polyline>
        </svg>
      </label>

      <!-- Optional Mood Selector -->
      <div class="mood-pills">
        @for (m of moods; track m.value) {
          <button
            class="mood-pill"
            [class.active]="mood() === m.value"
            [attr.data-mood]="m.value"
            (click)="setMood(m.value)"
            title="{{ m.label }}"
          >
            <span class="mood-emoji">{{ m.emoji }}</span>
          </button>
        }
      </div>
    </div>

    <div class="actions-row">
      <label class="anon-toggle" [class.on]="isAnonymous()">
        <div class="toggle-switch" (click)="isAnonymous.set(!isAnonymous())">
          <div class="toggle-thumb"></div>
        </div>
        <span class="toggle-label">Anonymous</span>
      </label>

      <button
        class="publish-btn"
        [disabled]="!canPublish || isSubmitting()"
        [class.loading]="isSubmitting()"
        (click)="publish()"
      >
        @if (isSubmitting()) {
          <span class="spinner"></span>
          <span>Publishing…</span>
        } @else {
          <span class="btn-icon">✦</span>
          <span>Scrawl It</span>
        }
      </button>
    </div>
  </div>
</div>
