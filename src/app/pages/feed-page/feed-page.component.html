<div class="feed-layout">

  <!-- Header -->
  <header class="feed-top-bar">
    <div class="header-left">
      <div class="logo">
        <span class="logo-icon">✦</span>
        <span class="logo-text">Scrawl</span>
      </div>
      <div class="logo-subtitle">KBTU SOCIAL FEED</div>
    </div>
    
    <div class="search-sort-bar">
      <!-- Future Search Box placeholder -->
    </div>
    
    <div class="profile-actions">
      <a routerLink="/profile" class="nav-btn profile-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
        <span>Profile</span>
      </a>
      <a routerLink="/login" class="nav-btn logout-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
        <span>Logout</span>
      </a>
    </div>
  </header>

  <div class="feed-container">
    <aside class="sidebar-col">
      <app-faculty-sidebar 
        [faculties]="faculties()"
        [activeFacultyId]="activeFacultyId()"
        (facultySelected)="onFacultyChange($event)">
      </app-faculty-sidebar>
    </aside>

    <main class="feed-main-col">
      <div class="feed-header">
        <h1>What's happening at KBTU</h1>
        <p>Share your thoughts, mood, and moments</p>
      </div>

      <!-- Tag Filter Banner -->
      <div class="active-tag-banner" *ngIf="activeTag()">
        <span class="label">Filtered by tag:</span>
        <span class="tag-badge">#{{ activeTag() }}</span>
        <button class="clear-tag-btn" (click)="clearTagFilter()">Clear</button>
      </div>

      <app-new-scrawl (published)="onScrawlPublished($event)"></app-new-scrawl>

      <div class="scrawl-list">
        <!-- Skeleton Loader state -->
        <ng-container *ngIf="isLoading()">
          <div class="skeleton-card" *ngFor="let item of [1,2,3]">
            <div class="skeleton-header">
              <div class="skeleton-avatar"></div>
              <div class="skeleton-meta">
                <div class="skeleton-line title"></div>
                <div class="skeleton-line subtitle"></div>
              </div>
            </div>
            <div class="skeleton-body">
              <div class="skeleton-line full"></div>
              <div class="skeleton-line long"></div>
              <div class="skeleton-line short"></div>
            </div>
            <div class="skeleton-footer">
              <div class="skeleton-btn"></div>
              <div class="skeleton-btn"></div>
              <div class="skeleton-btn"></div>
            </div>
          </div>
        </ng-container>

        <!-- Fully Loaded Feed -->
        <ng-container *ngIf="!isLoading()">
          
          <!-- Empty State (No posts at all in faculty) -->
          <div class="empty-state" *ngIf="isEmpty">
            <div class="empty-icon">👀</div>
            <h3>No scrawls yet.</h3>
            <p>Be the first to post something here.</p>
          </div>

          <!-- Empty State (No posts matching tag filter) -->
          <div class="empty-state" *ngIf="isFilterEmpty">
            <div class="empty-icon">🔍</div>
            <h3>Nothing found for this filter</h3>
            <p>Try clearing the tag or selecting another one.</p>
            <button class="clear-tag-btn filled" (click)="clearTagFilter()">Clear Filters</button>
          </div>

          <!-- Feed Items -->
          <app-scrawl-card 
            *ngFor="let scrawl of scrawls()"
            [scrawl]="scrawl"
            (actionTriggered)="onActionTriggered($event)"
            (replyTriggered)="onReplyTriggered($event)"
            (replySubmitted)="onReplySubmitted($event)"
            (nestedReplySubmitted)="onNestedReplySubmitted($event)"
            (toggleReply)="onToggleReply($event)"
            (toggleReplies)="onToggleReplies($event)"
            (toggleNestedReply)="onToggleNestedReply($event)"
            (tagClicked)="onTagClick($event)">
          </app-scrawl-card>
        </ng-container>

      </div>
    </main>
  </div>
</div>
