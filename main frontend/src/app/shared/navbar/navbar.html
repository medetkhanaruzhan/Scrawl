<div class="navbar">
  <div class="logo">
    <img src="assets/logo.png" alt="Scrawl logo" class="brand-logo">
    <span>Scrawl</span>
  </div>

  <div class="links">
    <a routerLink="/feed">Feed</a>
    <a routerLink="/profile">Profile</a>
  </div>

  <div class="user">
    <div class="avatar">
      {{ getInitial() }}
    </div>

    <a routerLink="/login" class="nav-btn logout-btn" (click)="logout()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
        <polyline points="16 17 21 12 16 7"></polyline>
        <line x1="21" y1="12" x2="9" y2="12"></line>
      </svg>
      <span>Logout</span>
    </a>
  </div>

</div>
